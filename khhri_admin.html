<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHHRI · 관리자</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#f5f5f3; color:#1a1a18; }

/* 로그인 */
.login-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:#fff; border:1px solid #e8e8e4; border-radius:16px; padding:40px 36px; width:360px; }
.login-icon { width:48px; height:48px; border-radius:12px; background:#2D5A27; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
.login-icon svg { width:24px; height:24px; fill:#fff; }
.login-title { font-size:18px; font-weight:700; text-align:center; margin-bottom:4px; }
.login-sub { font-size:13px; color:#888; text-align:center; margin-bottom:28px; }
.login-fg { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.login-fg label { font-size:12px; color:#888; font-weight:500; }
.login-fg input { padding:11px 13px; border-radius:8px; border:1px solid #ddd; background:#fafafa; font-size:14px; outline:none; width:100%; }
.login-fg input:focus { border-color:#2D5A27; background:#fff; }
.login-btn { width:100%; padding:12px; border-radius:8px; background:#2D5A27; color:#fff; border:none; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }
.login-btn:hover { background:#245020; }
.login-btn:disabled { background:#aaa; cursor:not-allowed; }
.login-err { font-size:12px; color:#c0392b; text-align:center; margin-top:10px; display:none; }
.login-loading { font-size:12px; color:#888; text-align:center; margin-top:10px; display:none; }

/* 관리자 */
.admin-wrap { display:none; }
.nav { display:flex; align-items:center; justify-content:space-between; padding:13px 28px; background:#1a1a18; }
.nav-logo { display:flex; align-items:center; gap:9px; }
.nav-logo-icon { width:30px; height:30px; border-radius:6px; background:#2D5A27; display:flex; align-items:center; justify-content:center; }
.nav-logo-icon svg { width:15px; height:15px; fill:#fff; }
.nav-brand { font-size:13px; font-weight:600; color:#fff; }
.nav-badge { font-size:11px; background:#2D5A27; color:#fff; padding:2px 8px; border-radius:4px; margin-left:6px; }
.nav-right { display:flex; align-items:center; gap:12px; }
.nav-user { font-size:12px; color:#aaa; }
.logout-btn { font-size:12px; color:#aaa; background:transparent; border:1px solid #444; border-radius:6px; padding:5px 12px; cursor:pointer; }
.logout-btn:hover { color:#fff; border-color:#888; }

.main { max-width:960px; margin:0 auto; padding:36px 20px; }
.page-title { font-size:20px; font-weight:700; margin-bottom:4px; }
.page-sub { font-size:13px; color:#666; margin-bottom:28px; }

/* 통계 */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
.stat { background:#fff; border:1px solid #e8e8e4; border-radius:10px; padding:14px 16px; }
.stat label { font-size:11px; color:#888; display:block; margin-bottom:4px; }
.stat span { font-size:24px; font-weight:700; color:#1a1a18; }
.stat.green span { color:#2D5A27; }
.stat.red span { color:#c0392b; }

.grid2 { display:grid; grid-template-columns:380px 1fr; gap:20px; align-items:start; }

/* 카드 */
.card { background:#fff; border:1px solid #e8e8e4; border-radius:14px; padding:22px; }
.card-title { font-size:14px; font-weight:700; margin-bottom:16px; }

/* 폼 */
.fg { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.fg label { font-size:12px; color:#888; font-weight:500; }
.fg input, .fg select { padding:9px 12px; border-radius:8px; border:1px solid #ddd; background:#fafafa; font-size:13px; color:#1a1a18; outline:none; width:100%; }
.fg input:focus, .fg select:focus { border-color:#2D5A27; background:#fff; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* 실습 토글 */
.toggle-wrap { display:flex; gap:8px; }
.toggle-btn { flex:1; padding:9px; border-radius:8px; border:1px solid #ddd; font-size:13px; cursor:pointer; background:#fafafa; color:#888; transition:all 0.15s; text-align:center; }
.toggle-btn.pass-on { background:#e8f5e0; border-color:#2D5A27; color:#2D5A27; font-weight:600; }
.toggle-btn.fail-on { background:#fde8e8; border-color:#c0392b; color:#c0392b; font-weight:600; }

.add-btn { width:100%; padding:11px; border-radius:8px; background:#2D5A27; color:#fff; border:none; font-size:14px; font-weight:600; cursor:pointer; margin-top:4px; }
.add-btn:hover { background:#245020; }
.add-btn:disabled { background:#aaa; cursor:not-allowed; }
.add-msg { font-size:12px; text-align:center; margin-top:8px; display:none; }
.add-msg.ok { color:#2D6A1F; }
.add-msg.err { color:#c0392b; }

/* 목록 */
.list-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.list-head h3 { font-size:14px; font-weight:700; }
.list-actions { display:flex; gap:8px; align-items:center; }
.search-inp { padding:7px 12px; border-radius:8px; border:1px solid #ddd; font-size:13px; outline:none; width:150px; }
.search-inp:focus { border-color:#2D5A27; }
.export-btn { padding:7px 14px; border-radius:8px; border:1px solid #2D5A27; background:#fff; color:#2D5A27; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
.export-btn:hover { background:#e8f5e0; }

.filter-row { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.filter-btn { padding:5px 12px; border-radius:6px; border:1px solid #ddd; font-size:12px; cursor:pointer; background:#fff; color:#555; }
.filter-btn.on { background:#2D5A27; color:#fff; border-color:#2D5A27; }

table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { background:#f7f7f5; }
th { padding:10px 12px; text-align:left; font-size:11px; color:#888; font-weight:600; border-bottom:1px solid #e8e8e4; white-space:nowrap; }
td { padding:11px 12px; border-bottom:1px solid #f0f0ee; vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafafa; }
.badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px; white-space:nowrap; }
.b-pass { background:#e8f5e0; color:#2D6A1F; }
.b-fail { background:#fde8e8; color:#b33; }
.b-partial { background:#fff4e0; color:#a06000; }
.del-btn { padding:4px 10px; border-radius:6px; border:1px solid #ddd; background:#fff; font-size:12px; color:#888; cursor:pointer; white-space:nowrap; }
.del-btn:hover { border-color:#c0392b; color:#c0392b; background:#fde8e8; }
.empty-row td { text-align:center; color:#aaa; padding:32px; }

/* 스피너 */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid #ddd; border-top-color:#2D5A27; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
.tbl-loading { text-align:center; padding:24px; color:#888; font-size:13px; }
.tabs-main { display:flex; gap:6px; margin-bottom:20px; }
.main-tab { padding:9px 20px; border-radius:8px; border:1px solid #ddd; font-size:13px; cursor:pointer; background:#fff; color:#555; font-weight:500; }
.main-tab.on { background:#2D5A27; color:#fff; border-color:#2D5A27; }
.reg-btn { padding:5px 10px; border-radius:6px; border:1px solid #2D5A27; background:#e8f5e0; font-size:12px; color:#2D5A27; cursor:pointer; white-space:nowrap; }
.reg-btn:hover { background:#2D5A27; color:#fff; }
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 6 5 10c0 5 7 12 7 12s7-7 7-12c0-4-3-8-7-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
    </div>
    <div class="login-title">KHHRI 관리자</div>
    <div class="login-sub">한국원예치유연구소 · 합격자 관리 시스템</div>
    <div class="login-fg">
      <label>관리자 ID</label>
      <input id="lid" type="text" placeholder="아이디 입력" />
    </div>
    <div class="login-fg">
      <label>비밀번호</label>
      <input id="lpw" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-err" id="login-err">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div class="login-loading" id="login-loading"><span class="spinner"></span>로그인 중...</div>
  </div>
</div>

<!-- 관리자 메인 -->
<div class="admin-wrap" id="admin-wrap">
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8 2 5 6 5 10c0 5 7 12 7 12s7-7 7-12c0-4-3-8-7-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>
      </div>
      <div class="nav-brand">한국원예치유연구소<span class="nav-badge">관리자</span></div>
    </div>
    <div class="nav-right">
      <span class="nav-user" id="nav-user">🔐</span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </nav>

  <div class="main">
    <div class="page-title">합격자 관리</div>
    <div class="page-sub">원예임상전문가 자격검정 합격자를 등록·조회·삭제합니다.</div>

    <div class="tabs-main">
      <button class="main-tab on" onclick="switchMain('pass')">합격자 관리</button>
      <button class="main-tab" onclick="switchMain('apply')">응시 접수자</button>
    </div>

    <div id="main-pass">
    <div class="stats">
      <div class="stat"><label>전체 등록</label><span id="stat-total">-</span>명</div>
      <div class="stat green"><label>최종 합격</label><span id="stat-pass">-</span>명</div>
      <div class="stat red"><label>실습 미합격</label><span id="stat-partial">-</span>명</div>
    </div>

    <div class="grid2">
      <!-- 등록 폼 -->
      <div class="card">
        <div class="card-title">➕ 합격자 등록</div>
        <div class="row2">
          <div class="fg"><label>성명 *</label><input id="a-name" placeholder="홍길동" /></div>
          <div class="fg"><label>생년월일 (8자리) *</label><input id="a-birth" placeholder="19901215" maxlength="8" /></div>
        </div>
        <div class="row2">
          <div class="fg"><label>등급 *</label>
            <select id="a-grade">
              <option value="">선택</option>
              <option value="3">원예임상전문가 3급</option>
              <option value="2">원예임상전문가 2급</option>
              <option value="1">원예임상전문가 1급</option>
              <option value="sv">슈퍼바이저</option>
            </select>
          </div>
          <div class="fg"><label>시험 회차 *</label>
            <select id="a-round">
              <option value="">선택</option>
              <option value="1">제1회</option>
              <option value="2">제2회</option>
              <option value="3">제3회</option>
            </select>
          </div>
        </div>
        <div class="fg">
          <label>필기 점수 * (0~100)</label>
          <input id="a-score" type="number" placeholder="예: 78" min="0" max="100" />
        </div>
        <div class="fg">
          <label>실습 평가 *</label>
          <div class="toggle-wrap">
            <button class="toggle-btn" id="prac-pass" onclick="setPrac(true)">✓ 합격</button>
            <button class="toggle-btn" id="prac-fail" onclick="setPrac(false)">✗ 불합격</button>
          </div>
        </div>
        <div class="fg">
          <label>합격일</label>
          <input id="a-date" type="date" />
        </div>
        <button class="add-btn" id="add-btn" onclick="doAdd()">등록하기</button>
        <div class="add-msg" id="add-msg"></div>
      </div>

      <!-- 목록 -->
      <div>
        <div class="list-head">
          <h3>합격자 목록</h3>
          <div class="list-actions">
            <input class="search-inp" id="search-inp" placeholder="이름 검색..." oninput="renderList()" />
            <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
          </div>
        </div>
        <div class="filter-row">
          <button class="filter-btn on" onclick="setFilter('all',this)">전체</button>
          <button class="filter-btn" onclick="setFilter('pass',this)">최종합격</button>
          <button class="filter-btn" onclick="setFilter('partial',this)">실습미합격</button>
          <button class="filter-btn" onclick="setFilter('3',this)">3급</button>
          <button class="filter-btn" onclick="setFilter('2',this)">2급</button>
          <button class="filter-btn" onclick="setFilter('1',this)">1급</button>
          <button class="filter-btn" onclick="setFilter('sv',this)">SV</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden">
          <div class="tbl-loading" id="tbl-loading"><span class="spinner"></span>불러오는 중...</div>
          <table id="tbl" style="display:none">
            <thead>
              <tr>
                <th>성명</th><th>등급</th><th>회차</th><th>필기</th><th>실습</th><th>상태</th><th>합격일</th><th></th>
              </tr>
            </thead>
            <tbody id="list-body"></tbody>
          </table>
        </div>
      </div>
    </div>
    </div><!-- end main-pass -->

    <!-- 접수자 목록 -->
    <div id="main-apply" style="display:none">
      <div class="stats">
        <div class="stat"><label>전체 접수</label><span id="stat-apply-total">-</span>명</div>
        <div class="stat green"><label>이번 회차</label><span id="stat-apply-round">-</span>명</div>
        <div class="stat red"><label>미입금</label><span id="stat-apply-unpaid">-</span>명</div>
      </div>
      <div class="list-head" style="margin-bottom:12px">
        <h3>응시 접수자 목록</h3>
        <div class="list-actions">
          <input class="search-inp" id="apply-search" placeholder="이름 검색..." oninput="renderApply()" />
          <button class="export-btn" onclick="exportApplyCSV()">CSV 내보내기</button>
        </div>
      </div>
      <div class="filter-row">
        <button class="filter-btn on" onclick="setApplyFilter('all',this)">전체</button>
        <button class="filter-btn" onclick="setApplyFilter('3',this)">제3회</button>
        <button class="filter-btn" onclick="setApplyFilter('4',this)">제4회</button>
        <button class="filter-btn" onclick="setApplyFilter('g3',this)">3급</button>
        <button class="filter-btn" onclick="setApplyFilter('g2',this)">2급</button>
        <button class="filter-btn" onclick="setApplyFilter('g1',this)">1급</button>
        <button class="filter-btn" onclick="setApplyFilter('sv',this)">SV</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="tbl-loading" id="apply-tbl-loading"><span class="spinner"></span>불러오는 중...</div>
        <table id="apply-tbl" style="display:none">
          <thead>
            <tr>
              <th>수험번호</th><th>성명</th><th>등급</th><th>회차</th>
              <th>연락처</th><th>이메일</th><th>접수일</th><th>합격자등록</th>
            </tr>
          </thead>
          <tbody id="apply-body"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }                                    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// =============================================
// 🔧 여기에 Firebase 설정값을 붙여넣으세요
// =============================================
const firebaseConfig = {
  apiKey: "AIzaSyCjQ9mVRku1TxEEP3gVET_m7nXgvQK0_Jc",
  authDomain: "khhri-cert.firebaseapp.com",
  projectId: "khhri-cert",
  storageBucket: "khhri-cert.firebasestorage.app",
  messagingSenderId: "264415215694",
  appId: "1:264415215694:web:3416d7c2852fee31fe431f",
  measurementId: "G-SFZQG3QW6X"
};
// =============================================

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const GL_FULL = {
  '3':'원예임상전문가 3급',
  '2':'원예임상전문가 2급',
  '1':'원예임상전문가 1급',
  'sv':'슈퍼바이저'
};

let allData   = [];
let pracVal   = null;
let filterVal = 'all';

// 로그인 상태 감지
onAuthStateChanged(auth, user => {
  if(user) {
    document.getElementById('login-wrap').style.display  = 'none';
    document.getElementById('admin-wrap').style.display  = 'block';
    document.getElementById('nav-user').textContent      = '🔐 ' + user.email;
    loadData();
  } else {
    document.getElementById('login-wrap').style.display  = 'flex';
    document.getElementById('admin-wrap').style.display  = 'none';
  }
});

// 로그인
window.doLogin = async function() {
  const id  = document.getElementById('lid').value.trim();
  const pw  = document.getElementById('lpw').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  const ld  = document.getElementById('login-loading');

  err.style.display = 'none';
  if(!id || !pw) { err.textContent='아이디와 비밀번호를 입력해주세요.'; err.style.display='block'; return; }

  btn.disabled = true;
  ld.style.display = 'block';

  try {
    await signInWithEmailAndPassword(auth, id, pw);
  } catch(e) {
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    ld.style.display = 'none';
  }
};

// 로그아웃
window.doLogout = async function() {
  await signOut(auth);
  document.getElementById('lid').value = '';
  document.getElementById('lpw').value = '';
};

// 데이터 로드
async function loadData() {
  document.getElementById('tbl-loading').style.display = 'block';
  document.getElementById('tbl').style.display = 'none';
  try {
    const snap = await getDocs(collection(db, 'applicants'));
    allData = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    renderList();
    updateStats();
  } catch(e) {
    console.error('데이터 로드 오류:', e);
  } finally {
    document.getElementById('tbl-loading').style.display = 'none';
    document.getElementById('tbl').style.display = 'table';
  }
}

// 메인 탭 전환
window.switchMain = function(t) {
  document.querySelectorAll('.main-tab').forEach((b,i) => b.classList.toggle('on', (i===0&&t==='pass')||(i===1&&t==='apply')));
  document.getElementById('main-pass').style.display  = t==='pass' ? 'block' : 'none';
  document.getElementById('main-apply').style.display = t==='apply' ? 'block' : 'none';
  if(t==='apply') loadApplyData();
};

// 접수자 데이터
let applyData = [];
let applyFilter = 'all';

async function loadApplyData() {
  document.getElementById('apply-tbl-loading').style.display = 'block';
  document.getElementById('apply-tbl').style.display = 'none';
  try {
    const snap = await getDocs(collection(db, 'applications'));
    applyData = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    renderApply();
    updateApplyStats();
  } catch(e) {
    console.error('접수자 로드 오류:', e);
  } finally {
    document.getElementById('apply-tbl-loading').style.display = 'none';
    document.getElementById('apply-tbl').style.display = 'table';
  }
}

window.setApplyFilter = function(v, el) {
  applyFilter = v;
  document.querySelectorAll('#main-apply .filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderApply();
};

window.renderApply = function() {
  const q = document.getElementById('apply-search').value.trim();
  let list = applyData.filter(x => !q || x.name.includes(q));
  if(applyFilter==='3')  list = list.filter(x => x.round==='3');
  if(applyFilter==='4')  list = list.filter(x => x.round==='4');
  if(applyFilter==='g3') list = list.filter(x => x.grade==='3');
  if(applyFilter==='g2') list = list.filter(x => x.grade==='2');
  if(applyFilter==='g1') list = list.filter(x => x.grade==='1');
  if(applyFilter==='sv') list = list.filter(x => x.grade==='sv');

  const tbody = document.getElementById('apply-body');
  if(list.length===0) {
    tbody.innerHTML='<tr class="empty-row"><td colspan="8">접수자가 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(f => `<tr>
    <td style="font-size:11px">${f.examNo||'-'}</td>
    <td><strong>${f.name}</strong></td>
    <td>${GL_FULL[f.grade]||f.grade}</td>
    <td>제${f.round}회</td>
    <td>${f.phone||'-'}</td>
    <td>${f.email||'-'}</td>
    <td>${f.appliedAt||'-'}</td>
    <td><button class="reg-btn" onclick="registerFromApply('${f._id}')">합격자 등록</button></td>
  </tr>`).join('');
};

// 접수자에서 바로 합격자 등록
window.registerFromApply = function(applyId) {
  const f = applyData.find(x => x._id === applyId);
  if(!f) return;
  // 합격자 등록 탭으로 이동하고 정보 자동 채우기
  switchMain('pass');
  document.getElementById('a-name').value  = f.name || '';
  document.getElementById('a-birth').value = f.birth || '';
  document.getElementById('a-grade').value = f.grade || '';
  document.getElementById('a-round').value = f.round || '';
  alert('접수자 정보가 자동 입력됐어요!\n필기 점수와 실습 평가를 입력 후 등록해주세요.');
};

function updateApplyStats() {
  document.getElementById('stat-apply-total').textContent   = applyData.length;
  const latest = applyData.filter(x => x.round==='3');
  document.getElementById('stat-apply-round').textContent   = latest.length;
  document.getElementById('stat-apply-unpaid').textContent  = applyData.filter(x => x.status==='접수완료').length;
}

// 실습 토글
window.setPrac = function(v) {
  pracVal = v;
  document.getElementById('prac-pass').className = 'toggle-btn' + (v===true  ? ' pass-on' : '');
  document.getElementById('prac-fail').className = 'toggle-btn' + (v===false ? ' fail-on' : '');
};

// 등록
window.doAdd = async function() {
  const name  = document.getElementById('a-name').value.trim();
  const birth = document.getElementById('a-birth').value.trim();
  const grade = document.getElementById('a-grade').value;
  const round = document.getElementById('a-round').value;
  const score = parseInt(document.getElementById('a-score').value);
  const date  = document.getElementById('a-date').value;
  const msg   = document.getElementById('add-msg');
  const btn   = document.getElementById('add-btn');

  const showErr = t => { msg.textContent=t; msg.className='add-msg err'; msg.style.display='block'; };

  if(!name||!birth||!grade||!round||isNaN(score)||pracVal===null) { showErr('⚠ 모든 항목을 입력해주세요.'); return; }
  if(birth.length!==8||isNaN(Number(birth))) { showErr('⚠ 생년월일을 8자리 숫자로 입력해주세요.'); return; }
  if(score<0||score>100) { showErr('⚠ 점수는 0~100 사이로 입력해주세요.'); return; }

  // 중복 체크
  const dup = allData.find(x => x.name===name && x.birth===birth && x.grade===grade && x.round===round);
  if(dup) { showErr('⚠ 이미 등록된 응시자입니다.'); return; }

  btn.disabled = true;
  btn.textContent = '등록 중...';

  try {
    const docRef = await addDoc(collection(db, 'applicants'), {
      name, birth, grade, round, score,
      practical: pracVal,
      date: date || ''
    });
    allData.push({ _id: docRef.id, name, birth, grade, round, score, practical: pracVal, date: date||'' });
    renderList();
    updateStats();

    // 폼 초기화
    ['a-name','a-birth','a-score','a-date'].forEach(id => document.getElementById(id).value='');
    document.getElementById('a-grade').value='';
    document.getElementById('a-round').value='';
    pracVal=null;
    document.getElementById('prac-pass').className='toggle-btn';
    document.getElementById('prac-fail').className='toggle-btn';

    msg.textContent='✓ 등록 완료!';
    msg.className='add-msg ok';
    msg.style.display='block';
    setTimeout(()=>{ msg.style.display='none'; }, 2500);
  } catch(e) {
    showErr('⚠ 등록 중 오류가 발생했습니다. 다시 시도해주세요.');
    console.error(e);
  } finally {
    btn.disabled=false;
    btn.textContent='등록하기';
  }
};

// 삭제
window.doDelete = async function(docId) {
  if(!confirm('정말 삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, 'applicants', docId));
    allData = allData.filter(x => x._id !== docId);
    renderList();
    updateStats();
  } catch(e) {
    alert('삭제 중 오류가 발생했습니다.');
    console.error(e);
  }
};

// 필터
window.setFilter = function(v, el) {
  filterVal = v;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  renderList();
};

// 목록 렌더링
window.renderList = function() {
  const q = document.getElementById('search-inp').value.trim();
  let list = allData.filter(x => !q || x.name.includes(q));
  if(filterVal==='pass')    list = list.filter(x => x.score>=60 && x.practical===true);
  if(filterVal==='partial') list = list.filter(x => !(x.score>=60 && x.practical===true));
  if(['3','2','1','sv'].includes(filterVal)) list = list.filter(x => x.grade===filterVal);

  const tbody = document.getElementById('list-body');
  if(list.length===0) {
    tbody.innerHTML='<tr class="empty-row"><td colspan="8">등록된 데이터가 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(f => {
    const isFinal   = f.score>=60 && f.practical===true;
    const isPartial = f.score>=60 && f.practical!==true;
    const badge     = isFinal
      ? '<span class="badge b-pass">최종합격</span>'
      : isPartial
        ? '<span class="badge b-partial">실습미합격</span>'
        : '<span class="badge b-fail">불합격</span>';
    const pracBadge = f.practical===true
      ? '<span class="badge b-pass">합격</span>'
      : '<span class="badge b-fail">불합격</span>';
    return `<tr>
      <td><strong>${f.name}</strong></td>
      <td>${GL_FULL[f.grade]||f.grade}</td>
      <td>제${f.round}회</td>
      <td>${f.score}점</td>
      <td>${pracBadge}</td>
      <td>${badge}</td>
      <td>${f.date||'-'}</td>
      <td><button class="del-btn" onclick="doDelete('${f._id}')">삭제</button></td>
    </tr>`;
  }).join('');
};

// 통계
function updateStats() {
  document.getElementById('stat-total').textContent   = allData.length;
  document.getElementById('stat-pass').textContent    = allData.filter(x=>x.score>=60&&x.practical===true).length;
  document.getElementById('stat-partial').textContent = allData.filter(x=>!(x.score>=60&&x.practical===true)).length;
}

// CSV 내보내기
window.exportCSV = function() {
  const rows = [['성명','생년월일','등급','회차','필기점수','실습','상태','합격일']];
  allData.forEach(f => {
    const isFinal   = f.score>=60 && f.practical===true;
    const isPartial = f.score>=60 && f.practical!==true;
    rows.push([
      f.name, f.birth, GL_FULL[f.grade]||f.grade,
      '제'+f.round+'회', f.score+'점',
      f.practical===true?'합격':'불합격',
      isFinal?'최종합격':isPartial?'실습미합격':'불합격',
      f.date||'-'
    ]);
  });
  const csv  = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'KHHRI_합격자명단_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};
</script>
